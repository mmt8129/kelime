<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kelime Oyunu</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: linear-gradient(to bottom, #1e3a8a, #60a5fa);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 5px;
            overflow-x: hidden;
        }

        .game-container {
            width: 100%;
            max-width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .word-boxes {
            display: flex;
            flex-wrap: nowrap;
            justify-content: center;
            gap: 3px;
            margin-top: 10px;
            width: 100%;
            padding: 0 5px;
        }

        .letter-box {
            background: white;
            border: 2px solid #333;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
            text-transform: uppercase;
            transition: all 0.3s ease;
            flex-shrink: 0;
            aspect-ratio: 1;
        }

        .letter-box.hint {
            background: #dbeafe;
            color: #1e40af;
        }

        .letter-box.filled {
            background: #f3f4f6;
            color: #111;
        }

        .letter-box.correct {
            background: #22c55e;
            color: white;
            border-color: #16a34a;
            animation: pulse 0.5s ease;
        }

        .letter-box.wrong {
            background: #ef4444;
            color: white;
            border-color: #dc2626;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .description-box {
            background: rgba(255, 255, 255, 0.95);
            padding: 12px;
            border-radius: 12px;
            width: calc(100% - 20px);
            max-width: 380px;
            text-align: center;
            font-size: 15px;
            line-height: 1.4;
            color: #333;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            max-height: 100px;
            overflow-y: auto;
        }

        .message {
            font-size: 18px;
            font-weight: bold;
            height: 25px;
            color: white;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }

        .controls {
            display: flex;
            gap: 10px;
            width: 100%;
            justify-content: center;
            padding: 0 10px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        .btn-hint {
            background: #fbbf24;
            color: #92400e;
        }

        .btn-new {
            background: #3b82f6;
            color: white;
        }

        .btn:active {
            transform: scale(0.95);
        }

        .keyboard {
            display: flex;
            flex-direction: column;
            gap: 6px;
            width: 100%;
            margin-top: 5px;
            padding: 0 5px;
        }

        .keyboard-row {
            display: flex;
            justify-content: center;
            gap: 3px;
        }

        .key {
            width: 30px;
            height: 40px;
            background: white;
            border: 2px solid #ddd;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.1s;
            user-select: none;
        }

        .key:active {
            background: #e5e7eb;
            transform: scale(0.95);
        }

        .key.wide {
            width: 55px;
            background: #f3f4f6;
        }

        .loading {
            color: white;
            font-size: 18px;
            margin-top: 50px;
        }

        .error {
            color: #fecaca;
            font-size: 16px;
            text-align: center;
            padding: 20px;
        }
    </style>
<base target="_blank">
</head>
<body>
    <div class="game-container" id="gameContainer">
        <div class="loading" id="loading">Kelimeler yükleniyor...</div>
    </div>

    <script>
        const GITHUB_URL = 'https://raw.githubusercontent.com/mmt8129/kelime/refs/heads/main/szlk.txt';
        const WORKER_URL = 'https://black-sun-b6c4.06mmt8129.workers.dev';

        let words = [];
        let currentWord = '';
        let currentDescription = '';
        let hintIndices = [];
        let filledIndices = [];

        async function loadWords() {
            try {
                const response = await fetch(GITHUB_URL);
                const text = await response.text();
                words = text.split(/\r?\n/)
                    .map(w => w.trim())
                    .filter(w => w.length > 0 && w.length <= 12 && /^[a-zA-ZçÇğĞıİöÖşŞüÜ]+$/.test(w));

                if (words.length === 0) {
                    throw new Error('Kelimeler yüklenemedi');
                }

                initGame();
            } catch (error) {
                document.getElementById('gameContainer').innerHTML = 
                    '<div class="error">Kelimeler yüklenemedi. İnternet bağlantınızı kontrol edin.<br>Hata: ' + error.message + '</div>';
            }
        }

        function initGame() {
            const container = document.getElementById('gameContainer');
            container.innerHTML = `
                <div class="message" id="message"></div>
                <div class="word-boxes" id="wordBoxes"></div>
                <div class="description-box" id="descriptionBox">TDK açıklaması yükleniyor...</div>
                <div class="controls">
                    <button class="btn btn-hint" id="hintBtn" onclick="revealHint()">Harf Al</button>
                    <button class="btn btn-new" onclick="newGame()">Yeni Kelime</button>
                </div>
                <div class="keyboard" id="keyboard"></div>
            `;
            createKeyboard();
            newGame();
        }

        function createKeyboard() {
            const keyboard = document.getElementById('keyboard');
            const rows = [
                'QWERTYUIOPĞÜ',
                'ASDFGHJKLŞİ',
                'ZXCVBNMÖÇ'
            ];

            rows.forEach(row => {
                const rowDiv = document.createElement('div');
                rowDiv.className = 'keyboard-row';
                row.split('').forEach(char => {
                    const key = document.createElement('div');
                    key.className = 'key';
                    key.textContent = char;
                    key.onclick = () => typeLetter(char);
                    rowDiv.appendChild(key);
                });
                keyboard.appendChild(rowDiv);
            });

            const lastRow = document.createElement('div');
            lastRow.className = 'keyboard-row';

            const backspace = document.createElement('div');
            backspace.className = 'key wide';
            backspace.textContent = '←';
            backspace.onclick = deleteLast;
            lastRow.appendChild(backspace);

            keyboard.appendChild(lastRow);
        }

        function toTurkishUpper(str) {
            return str.replace(/i/g, 'İ').replace(/ı/g, 'I').toUpperCase();
        }

        async function getTDKDescription(kelime) {
            try {
                const response = await fetch(`${WORKER_URL}?ara=${encodeURIComponent(kelime)}`);
                const data = await response.json();

                if (data && data[0] && data[0].anlamlarListe && data[0].anlamlarListe.length > 0) {
                    return data[0].anlamlarListe[0].anlam;
                }
                return 'Açıklama bulunamadı';
            } catch (error) {
                return 'TDK bağlantı hatası';
            }
        }

        function calculateBoxSize(wordLength) {
            const screenWidth = window.innerWidth - 20;
            const gap = 3;
            const maxSize = 45;
            const minSize = 28;

            const availableWidth = screenWidth - (gap * (wordLength - 1));
            const calculatedSize = Math.floor(availableWidth / wordLength);

            return Math.max(minSize, Math.min(maxSize, calculatedSize));
        }

        async function newGame() {
            document.getElementById('message').textContent = '';

            let validWords = words.filter(w => w.length >= 4 && w.length <= 12);
            if (validWords.length === 0) validWords = words;

            const rawWord = validWords[Math.floor(Math.random() * validWords.length)];
            currentWord = toTurkishUpper(rawWord);

            currentDescription = await getTDKDescription(rawWord);

            hintIndices = [];
            filledIndices = [];

            const wordLength = currentWord.length;
            let hintCount = 0;
            if (wordLength <= 4) hintCount = 0;
            else if (wordLength <= 7) hintCount = 1;
            else if (wordLength <= 10) hintCount = 2;
            else hintCount = 3;

            while (hintIndices.length < hintCount) {
                const idx = Math.floor(Math.random() * wordLength);
                if (!hintIndices.includes(idx)) {
                    hintIndices.push(idx);
                }
            }

            renderBoxes();
            document.getElementById('descriptionBox').textContent = currentDescription;
            document.getElementById('hintBtn').disabled = false;
        }

        function renderBoxes() {
            const container = document.getElementById('wordBoxes');
            container.innerHTML = '';

            const boxSize = calculateBoxSize(currentWord.length);

            for (let i = 0; i < currentWord.length; i++) {
                const box = document.createElement('div');
                box.className = 'letter-box';
                box.id = `box-${i}`;
                box.style.width = boxSize + 'px';
                box.style.height = boxSize + 'px';
                box.style.fontSize = Math.floor(boxSize * 0.5) + 'px';

                if (hintIndices.includes(i)) {
                    box.classList.add('hint');
                    box.textContent = currentWord[i];
                } else if (filledIndices.includes(i)) {
                    box.classList.add('filled');
                    box.textContent = currentWord[i];
                }

                container.appendChild(box);
            }
        }

        // Kullanıcı yazarken: soldan sağa ilk boş kutuyu bul
        function getNextEmptyIndex() {
            for (let i = 0; i < currentWord.length; i++) {
                if (!hintIndices.includes(i) && !filledIndices.includes(i)) {
                    return i;
                }
            }
            return -1;
        }

        // Harf al butonu: rastgele boş kutuyu bul
        function getRandomEmptyIndex() {
            const emptyIndices = [];
            for (let i = 0; i < currentWord.length; i++) {
                if (!hintIndices.includes(i) && !filledIndices.includes(i)) {
                    emptyIndices.push(i);
                }
            }
            if (emptyIndices.length === 0) return -1;
            return emptyIndices[Math.floor(Math.random() * emptyIndices.length)];
        }

        function typeLetter(char) {
            const emptyIndex = getNextEmptyIndex();
            if (emptyIndex === -1) return;

            filledIndices.push(emptyIndex);
            const box = document.getElementById(`box-${emptyIndex}`);
            box.classList.add('filled');
            box.textContent = char;

            if (filledIndices.length + hintIndices.length === currentWord.length) {
                checkAnswer();
            }
        }

        function deleteLast() {
            if (filledIndices.length === 0) return;

            const lastIndex = filledIndices[filledIndices.length - 1];
            filledIndices.pop();

            const box = document.getElementById(`box-${lastIndex}`);
            box.classList.remove('filled');
            box.textContent = '';
        }

        function revealHint() {
            const emptyIndex = getRandomEmptyIndex(); // RASTGELE BOŞ KUTU
            if (emptyIndex === -1) {
                document.getElementById('hintBtn').disabled = true;
                return;
            }

            hintIndices.push(emptyIndex);
            const box = document.getElementById(`box-${emptyIndex}`);
            box.classList.add('hint');
            box.textContent = currentWord[emptyIndex];

            if (filledIndices.length + hintIndices.length === currentWord.length) {
                checkAnswer();
            }
        }

        function checkAnswer() {
            let userWord = '';
            for (let i = 0; i < currentWord.length; i++) {
                const box = document.getElementById(`box-${i}`);
                userWord += box.textContent || '';
            }

            const normalizedUserWord = userWord.replace(/İ/g, 'I');
            const normalizedCurrentWord = currentWord.replace(/İ/g, 'I');

            const isCorrect = normalizedUserWord === normalizedCurrentWord;
            const message = document.getElementById('message');

            for (let i = 0; i < currentWord.length; i++) {
                const box = document.getElementById(`box-${i}`);
                if (isCorrect) {
                    box.classList.add('correct');
                } else {
                    box.classList.add('wrong');
                }
            }

            if (isCorrect) {
                message.textContent = 'Doğru Cevap!';
                message.style.color = '#86efac';
            } else {
                message.textContent = 'Yanlış Cevap';
                message.style.color = '#fecaca';

                setTimeout(() => {
                    filledIndices = [];
                    renderBoxes();
                    message.textContent = '';
                }, 1000);
            }
        }

        window.addEventListener('resize', () => {
            if (currentWord) {
                renderBoxes();
            }
        });

        loadWords();
    </script>
</body>
</html>
